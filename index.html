<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>808 LAB — PALACIOS Social Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --c-draft:#666;--c-todo:#f59e0b;--c-pending:#3b82f6;--c-returned:#f97316;--c-validated:#22c55e;--c-published:#a855f7;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:12px;font-weight:600;letter-spacing:.12em;color:var(--text2)}
.logo em{color:var(--text);font-style:normal}
.client-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;margin-left:10px}
.topbar-left{display:flex;align-items:center}
.topbar-right{display:flex;align-items:center;gap:8px}
.role-chip{font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 10px;border-radius:20px;border:none;background:#1d3a5c;color:#60a5fa}
.btn-toggle{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-toggle:hover{border-color:var(--text3);color:var(--text)}
.nav{display:flex;align-items:center;gap:2px;padding:0 16px;height:40px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:5px 12px;border-radius:var(--radius);border:none;background:transparent;color:var(--text3);cursor:pointer;letter-spacing:.03em;transition:all .15s}
.nav-btn:hover{color:var(--text2);background:var(--surface2)}
.nav-btn.active{color:var(--text);background:var(--surface2)}
.nav-btn i{font-size:14px}
.nav-badge{font-size:9px;font-weight:700;background:#e879f9;color:#1a001a;border-radius:20px;padding:1px 6px;margin-left:2px;display:none}
.legend{display:flex;align-items:center;gap:12px;padding:6px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);white-space:nowrap}
.legend-dot{width:7px;height:7px;border-radius:50%}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.filter-group{display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text2)}
.filter-btn.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.add-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:7px 14px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px}
.stat-n{font-size:24px;font-weight:500}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
.kanban{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;align-items:start}
.col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.col-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.col-count{font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:20px;border:1px solid var(--border)}
.col-empty{text-align:center;padding:20px 0;color:var(--text3);font-size:11px}
.col-empty i{font-size:20px;display:block;margin-bottom:6px;opacity:.4}
.card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--card-color,#444);border-radius:var(--radius);padding:10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,transform .1s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.urgent{animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.card-title{font-size:12px;font-weight:500;line-height:1.4;flex:1;color:var(--text)}
.nets{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
.net{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;letter-spacing:.03em}
.net-li{background:#1d3a5c;color:#60a5fa}
.net-ig{background:#3d1a2e;color:#f48fb1}
.net-pi{background:#3d1a1a;color:#ef9a9a}
.net-fb{background:#1a2a3d;color:#90caf9}
.net-reel{background:#2a1a3d;color:#ce93d8}
.net-story{background:#3d2a1a;color:#ffcc80}
.card-flag{display:flex;align-items:flex-start;gap:5px;padding:5px 7px;border-radius:5px;background:#291e00;border:1px solid #3d2e00;margin:6px 0}
.card-flag i{font-size:12px;color:#f59e0b;flex-shrink:0;margin-top:1px}
.card-flag span{font-size:10px;color:#d4a017;line-height:1.4}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.card-cat{font-size:10px;color:var(--text3);background:var(--surface);padding:2px 7px;border-radius:3px;border:1px solid var(--border)}
.card-date{font-size:10px;color:var(--text3)}
.card-drive{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);margin-top:4px}
.card-drive i{font-size:11px;color:#4caf50}

/* IDEATION */
.idea-layout{display:grid;grid-template-columns:300px 1fr;gap:16px;min-height:calc(100vh - 180px)}
.idea-sidebar{display:flex;flex-direction:column;gap:10px}
.idea-generator{background:var(--surface);border:1px solid #4c1d95;border-radius:var(--radius-lg);padding:14px}
.gen-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#a855f7;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.gen-title i{font-size:14px}
.gen-field{margin-bottom:8px}
.gen-field label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:4px}
.gen-field select{font-size:12px;font-family:inherit;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);padding:6px 9px;width:100%;outline:none}
.gen-field select option{background:var(--surface)}
.gen-count-row{display:flex;gap:5px}
.gcb{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.gcb.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.gen-run{width:100%;margin-top:10px;padding:9px;border-radius:var(--radius);border:none;background:#4c1d95;color:#e9d5ff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.04em;transition:all .15s;font-family:inherit}
.gen-run:hover{background:#5b21b6}
.gen-run:disabled{opacity:.4;cursor:not-allowed}
.gen-loading{display:flex;align-items:center;gap:8px;padding:10px;border-radius:var(--radius);background:#1a0a2e;border:1px solid #4c1d95;font-size:11px;color:#c084fc;margin-top:8px}
.gen-loading i{font-size:16px;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.gen-ok{display:flex;align-items:center;gap:5px;padding:8px 0;font-size:11px;color:#4ade80}
.gen-err{display:flex;align-items:center;gap:5px;padding:8px 0;font-size:11px;color:#ef4444}
.idea-manual{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.idea-manual h4{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.idea-flow{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px}
.idea-flow h4{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.flow-step{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);margin-bottom:5px}
.flow-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.idea-board{overflow-y:auto}
.idea-cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;align-items:start}
.idea-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px}
.idea-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.idea-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--ic,#555);border-radius:var(--radius);padding:10px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.idea-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.idea-card.ai-gen{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.idea-card-title{font-size:12px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:5px}
.idea-card-brief{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.idea-meta{display:flex;align-items:center;justify-content:space-between;gap:6px}
.idea-axe-tag{font-size:9px;padding:2px 7px;border-radius:3px;background:var(--surface);border:1px solid var(--border)}
.ai-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:#a855f7;background:#1a0a2e;border:1px solid #4c1d95;border-radius:3px;padding:1px 5px}
.idea-actions{display:flex;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);flex-wrap:wrap}
.ia{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;font-family:inherit;color:var(--text3)}
.ia:hover{border-color:#555;color:var(--text2)}
.ia-green{color:#4ade80;border-color:#166534}
.ia-green:hover{background:#0a1f0a}
.ia-purple{color:#c084fc;border-color:#4c1d95}
.ia-purple:hover{background:#1a0a2e}
.ia-red{color:#f87171;border-color:#7f1d1d}
.ia-red:hover{background:#1f0a0a}
.ia-push{color:#4ade80;background:#0a2010;border-color:#166534;font-weight:500}
.ia-push:hover{background:#0a1f0a}
.ia-pushed{color:var(--text3);background:transparent;border-color:var(--border);pointer-events:none;opacity:.5}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px;line-height:1;border-radius:4px;display:flex;align-items:center}
.modal-close:hover{color:var(--text2)}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:12px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase}
.field input,.field textarea,.field select{font-size:13px;font-family:inherit;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);padding:7px 10px;width:100%;resize:vertical;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#555}
.field textarea{min-height:80px}
.field select option{background:var(--surface)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cb-group{display:flex;flex-wrap:wrap;gap:6px}
.cb-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);transition:all .15s}
.cb-item input{accent-color:var(--text);cursor:pointer}
.flag-input{display:flex;flex-direction:column;gap:4px}
.flag-line{display:flex;align-items:center;gap:6px}
.flag-line input{flex:1;font-size:12px;padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);outline:none}
.flag-line .rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px;line-height:1}
.add-flag{font-size:11px;color:var(--text3);background:none;border:1px dashed var(--border);padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s;font-family:inherit}
.add-flag:hover{border-color:var(--border2);color:var(--text2)}
.btn-primary{font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-ghost{font-size:13px;padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:#555;color:var(--text)}
.btn-validate{background:#14532d;color:#4ade80;border:1px solid #166534;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius);cursor:pointer}
.btn-push-modal{background:#0a1f0a;color:#4ade80;border:1px solid #166534;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius);cursor:pointer}
.status-header{border-radius:var(--radius);padding:10px 12px;margin-bottom:4px;border-left:3px solid var(--sh)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.preview-tabs{display:flex;gap:5px;margin-bottom:8px}
.ptab{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.ptab.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.preview-box{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);padding:12px;font-size:12px;color:var(--text2);line-height:1.7;min-height:80px;white-space:pre-wrap}
.comment{background:var(--surface2);border-radius:var(--radius);padding:8px 10px;border-left:2px solid var(--border2)}
.comment.client{border-left-color:#3b82f6}
.comment-meta{font-size:10px;color:var(--text3);margin-bottom:3px}
.warn-box{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:var(--radius);background:#1a1200;border:1px solid #3d2e00}
.warn-box i{color:#f59e0b;flex-shrink:0;font-size:14px;margin-top:1px}
.warn-box span{font-size:12px;color:#d4a017;line-height:1.5}
.drive-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#4caf50;background:#0a1f0a;border:1px solid #1a3a1a;border-radius:var(--radius);padding:6px 10px}

/* FEED */
.feed-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.feed-section-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.feed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.feed-cell{aspect-ratio:1;background:var(--surface2);border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:1px solid var(--border);transition:border-color .15s}
.feed-cell:hover{border-color:var(--border2)}
.feed-inner{text-align:center;font-size:9px;color:var(--text3);padding:6px}
.feed-inner i{font-size:18px;display:block;margin-bottom:4px;opacity:.4}
.feed-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;padding:6px;opacity:0;transition:opacity .2s}
.feed-cell:hover .feed-overlay{opacity:1}
.feed-overlay span{font-size:9px;color:#fff;line-height:1.3}
.feed-status-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%}
.pin-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.pin-cell{background:var(--surface2);border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:1px solid var(--border)}
.pin-cell:nth-child(odd){aspect-ratio:2/3}
.pin-cell:nth-child(even){aspect-ratio:1}

/* CALENDAR */
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-dh{text-align:center;font-size:10px;color:var(--text3);padding:4px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{background:var(--surface);border:1px solid var(--border);border-radius:5px;min-height:70px;padding:5px}
.cal-day.today{border-color:#3b82f6}
.cal-day.empty{opacity:.2}
.cal-num{font-size:10px;color:var(--text3);margin-bottom:3px}
.cal-post{font-size:9px;padding:2px 4px;border-radius:2px;margin-bottom:2px;cursor:pointer;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;font-weight:500;padding:8px 18px;border-radius:var(--radius);z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo"><em>808</em> LAB</span>
      <div class="client-chip"><i class="ti ti-building" style="font-size:12px"></i> PALACIOS</div>
    </div>
    <div class="topbar-right">
      <span class="role-chip" id="role-chip">ADMIN</span>
      <button class="btn-toggle" id="role-toggle" onclick="toggleRole()">Vue client</button>
    </div>
  </div>
  <div class="nav" id="main-nav">
    <button class="nav-btn" onclick="setView('ideation',this)"><i class="ti ti-bulb"></i> Idéation <span class="nav-badge" id="idea-badge"></span></button>
    <button class="nav-btn active" onclick="setView('kanban',this)"><i class="ti ti-layout-kanban"></i> Kanban</button>
    <button class="nav-btn" onclick="setView('calendar',this)"><i class="ti ti-calendar"></i> Planning</button>
    <button class="nav-btn" onclick="setView('feed',this)"><i class="ti ti-layout-grid"></i> Feed</button>
    <button class="nav-btn" onclick="setView('library',this)"><i class="ti ti-archive"></i> Bibliothèque</button>
    <button class="nav-btn" onclick="setView('hashtags',this)"><i class="ti ti-hash"></i> Hashtags</button>
  </div>
  <div class="legend" id="main-legend">
    <span style="font-size:10px;color:var(--text3);letter-spacing:.05em;font-weight:600;margin-right:4px">STATUTS</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--c-draft)"></span>Brouillon</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--c-todo)"></span>À compléter</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--c-pending)"></span>En attente</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--c-returned)"></span>Retour client</span>

// Generate hashtag block for a given net / axe / secteur
function getHashtags(net, axeId, secteur, maxTotal) {
  const base = HT_BASE[net] || HT_BASE.Instagram;
  const axeSet = (HT_SETS[axeId] || HT_SETS.projet)[net] || [];
  const secteurSet = secteur && secteur !== 'Général' ? ((HT_SECTEUR_EXTRA[secteur]||{})[net]||[]) : [];
  // limits per network
  const limits = { LinkedIn: 5, Instagram: 10, Pinterest: 5, Facebook: 3 };
  const max = maxTotal || limits[net] || 7;
  // combine: base first, then axe, then secteur, dedupe, trim to max
  const all = [...new Set([...base, ...axeSet, ...secteurSet])];
  return all.slice(0, max);
}

// Format hashtags as string
function htStr(tags) { return tags.join(' '); }

// Build preview text with smart hashtags
function buildPreview(net, card) {
  const text = card.text || '[Texte à rédiger]';
  const cat = card.cat || '';
  // map cat to axe
  const catAxeMap = {'Réalisation':'projet','Zoom Équipe':'humain','Produit':'produit','Matériaux':'materiaux','Coulisses':'coulisses','Zoom Produit':'produit','Humain & Histoire':'humain','Zoom Projet':'projet','Matériaux & Innovation':'materiaux','Coulisses Atelier':'coulisses','Secteur Ciblé':'secteur'};
  const axeId = catAxeMap[cat] || 'projet';
  const tags = getHashtags(net, axeId, card.secteur||'Général');
  const ht = htStr(tags);
  if(net==='LinkedIn') return `${text}\n\n${ht}`;
  if(net==='Instagram') return `${text}\n\n📍 Toulouse\n\n${ht}`;
  if(net==='Pinterest') return `${card.title||''}\n\n${text}\n\n${ht}\n\n🔗 www.palacios.fr`;
  if(net==='Facebook') return `${text}\n\n${ht}`;
  return text;
}

function ideaAction(type,id){

  else if(type==='reject'){S.ideas[idx].status='rejected';toast('Idée refusée');}
  else if(type==='capprove'){S.ideas[idx].status='approved';S.ideas[idx].comments=S.ideas[idx].comments||[];S.ideas[idx].comments.push({role:'client',text:'✓ Approuvé.',date:now});toast('Approuvé !');}

  saveAll();render();
}

[{"title":"Titre accrocheur max 80 caractères","brief":"Description de l'idée en 2-3 phrases concrètes.","hashtags":["#tag1","#tag2"]}]`;

function renderCalendar(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1);const last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;const total=Math.ceil((startDow+last.getDate())/7)*7;
  const fc=filtered();
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const todayStr=now.toISOString().split('T')[0];
  let h=`<div class="toolbar"><div style="font-size:13px;font-weight:500">${months[m]} ${y}</div>${S.role==='admin'?`<button class="add-btn" onclick="openNew()"><i class="ti ti-plus"></i> Nouveau post</button>`:''}</div>
  <div class="cal-header-row">${['LUN','MAR','MER','JEU','VEN','SAM','DIM'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}</div><div class="cal-grid">`;
  for(let i=0;i<total;i++){const dn=i-startDow+1;const valid=dn>=1&&dn<=last.getDate();const ds=valid?`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`:'';const isToday=ds===todayStr;const dc=valid?fc.filter(c=>c.date===ds):[];
  h+=`<div class="cal-day${isToday?' today':''}${!valid?' empty':''}"><div class="cal-num" style="${isToday?'color:#3b82f6;font-weight:600':''}">${valid?dn:''}</div>${dc.map(c=>{const s=ST[c.status]||ST.draft;return`<div class="cal-post" style="border-left-color:${s.hex};color:${s.hex};background:${s.hex}18" onclick="openCard('${c.id}')" title="${c.title}">${c.title}</div>`;}).join('')}</div>`;}
  return h+'</div>';
}

function renderFeed(){

  <div><div class="feed-section-title"><i class="ti ti-brand-pinterest" style="font-size:14px"></i> Pinterest <span style="font-weight:400;color:var(--text3)">${pi.length} épingles</span></div>

function renderHashtags(){
  const nets=['LinkedIn','Instagram','Pinterest','Facebook'];
  let h=`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:500;margin-bottom:4px">Bibliothèque de hashtags</div><div style="font-size:11px;color:var(--text3)">Sets pré-définis par axe éditorial et réseau. Utilisés automatiquement dans les aperçus.</div></div>`;

      </div>`;

function render(){

  const axeId=catAxeMap[cat]||'projet';
  body+=`<div><div style="font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Aperçu par réseau</div>
    <div class="preview-tabs" id="ptabs">${previewNets.map((n,i)=>`<button class="ptab${i===0?' active':''}" onclick="switchPreview('${n}','${id}')">${n}</button>`).join('')}</div>
    <div class="preview-box" id="preview-box">${ptexts[firstNet]||ptexts['LinkedIn']}</div>
    <div id="ht-chips" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${renderHtChips(axeId,firstNet,c.secteur)}</div>
  </div>`;
  if(c.driveFolder)body+=`<div><div style="font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Dossier Drive</div><div class="drive-chip"><i class="ti ti-brand-google-drive"></i>${c.driveFolder}</div></div>`;
  if(c.comments&&c.comments.length)body+=`<div><div style="font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Discussion</div>${c.comments.map(cm=>`<div class="comment ${cm.role}" style="margin-bottom:6px"><div class="comment-meta">${cm.role==='client'?'👤 Client':'🛠 Admin'} · ${cm.date}</div>${cm.text}</div>`).join('')}</div>`;
  body+=`<div class="field"><label>Ajouter un commentaire</label><textarea id="f-comment" placeholder="..." style="min-height:50px"></textarea></div>`;
  let footer=`<button class="btn-ghost" onclick="closeModal()">Fermer</button>`;
  if(isClient){if(c.flags&&c.flags.length)footer+=`<button class="btn-primary" onclick="submitReply('${id}')"><i class="ti ti-send"></i> Envoyer</button>`;if(c.status==='pending')footer+=`<button class="btn-validate" onclick="validateCard('${id}')"><i class="ti ti-check"></i> Valider</button>`;}
  else{footer+=`<button class="btn-ghost" onclick="addCmt('${id}')"><i class="ti ti-message"></i> Commenter</button><button class="btn-primary" onclick="openEdit('${id}')"><i class="ti ti-edit"></i> Modifier</button>`;}
  showModal(c.title,body,footer);
}

function switchPreview(net,id){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.textContent===net));
  const c=cById(id);
  document.getElementById('preview-box').textContent=buildPreview(net,c);
  const cat=c.cat||'';const catAxeMap={'Réalisation':'projet','Zoom Équipe':'humain','Produit':'produit','Matériaux':'materiaux','Coulisses':'coulisses','Zoom Produit':'produit','Humain & Histoire':'humain','Zoom Projet':'projet','Matériaux & Innovation':'materiaux','Coulisses Atelier':'coulisses','Secteur Ciblé':'secteur'};
  const axeId=catAxeMap[cat]||'projet';
  const chips=document.getElementById('ht-chips');if(chips)chips.innerHTML=renderHtChips(axeId,net,c.secteur);
}

function renderHtChips(axeId,net,secteur){
  const tags=getHashtags(net,axeId,secteur||'Général');
  return tags.map(t=>`<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);cursor:default">${t}</span>`).join('');
}

function openEdit(id){
  const c=cById(id);S.flagLines=[...(c.flags||[])];if(!S.flagLines.length)S.flagLines=[''];
  const html=`<div class="field"><label>Titre</label><input id="f-title" value="${c.title||''}"></div>
  <div class="grid2"><div class="field"><label>Catégorie</label><select id="f-cat">${CATS.map(v=>`<option${c.cat===v?' selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>Format</label><select id="f-format">${FORMATS.map(v=>`<option${c.format===v?' selected':''}>${v}</option>`).join('')}</select></div></div>
  <div class="field"><label>Réseaux</label><div class="cb-group" id="nets-cb">${NETS.map(n=>`<label class="cb-item"><input type="checkbox" value="${n}"${(c.nets||[]).includes(n)?' checked':''}> ${n}</label>`).join('')}</div></div>
  <div class="grid2"><div class="field"><label>Date</label><input id="f-date" type="date" value="${c.date||''}"></div><div class="field"><label>Statut</label><select id="f-status">${Object.entries(ST).map(([k,v])=>`<option value="${k}"${c.status===k?' selected':''}>${v.label}</option>`).join('')}</select></div></div>
  <div class="field"><label>Texte du post</label><textarea id="f-text">${c.text||''}</textarea></div>
  <div class="field"><label>Dossier Drive</label><input id="f-drive" value="${c.driveFolder||''}"></div>
  <div class="field"><label>Infos manquantes</label><div class="flag-input" id="flag-input-list">${S.flagLines.map((f,i)=>`<div class="flag-line" id="fl-${i}"><input value="${f}" placeholder="Info..." oninput="updateFlag(${i},this.value)"><button class="rm" onclick="removeFlag(${i})"><i class="ti ti-x"></i></button></div>`).join('')}</div><button class="add-flag" onclick="addFlagLine()"><i class="ti ti-plus" style="font-size:11px"></i> Ajouter</button></div>`;
  showModal('Modifier : '+c.title,html,`<button class="btn-ghost" onclick="closeModal()">Annuler</button><button class="btn-primary" onclick="saveEdit('${id}')">Enregistrer</button>`);
}

function saveEdit(id){const idx=cIdx(id);if(idx<0)return;S.cards[idx].title=document.getElementById('f-title').value.trim()||S.cards[idx].title;S.cards[idx].cat=document.getElementById('f-cat').value;S.cards[idx].format=document.getElementById('f-format').value;S.cards[idx].date=document.getElementById('f-date').value;S.cards[idx].status=document.getElementById('f-status').value;S.cards[idx].text=document.getElementById('f-text').value;S.cards[idx].driveFolder=document.getElementById('f-drive').value;S.cards[idx].nets=[...document.querySelectorAll('#nets-cb input:checked')].map(i=>i.value);S.cards[idx].flags=S.flagLines.filter(f=>f.trim());saveAll();closeModal();render();toast('Enregistré');}
function addCmt(id){const txt=document.getElementById('f-comment')?.value?.trim();if(!txt){toast('Vide');return;}const idx=cIdx(id);S.cards[idx].comments=S.cards[idx].comments||[];S.cards[idx].comments.push({role:'admin',text:txt,date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});saveAll();closeModal();render();toast('Commentaire ajouté');}
function submitReply(id){const txt=document.getElementById('f-client-reply')?.value?.trim();if(!txt){toast('Vide');return;}const idx=cIdx(id);S.cards[idx].comments=S.cards[idx].comments||[];S.cards[idx].comments.push({role:'client',text:txt,date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});S.cards[idx].status='returned';saveAll();closeModal();render();toast('Réponse envoyée');}
function validateCard(id){const idx=cIdx(id);S.cards[idx].status='validated';S.cards[idx].comments=S.cards[idx].comments||[];S.cards[idx].comments.push({role:'client',text:'✓ Post validé.',date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});saveAll();closeModal();render();toast('Validé !');}
function dupCard(id){const c=cById(id);if(!c)return;const nc=JSON.parse(JSON.stringify(c));nc.id='c'+Date.now();nc.title='[Copie] '+nc.title;nc.status='draft';nc.date='';nc.comments=[];S.cards.push(nc);saveAll();render();toast('Dupliqué en brouillon');}

function showModal(title,body,footer){closeModal();const ov=document.createElement('div');ov.className='overlay';ov.id='modal-ov';ov.onclick=e=>{if(e.target===ov)closeModal();};ov.innerHTML=`<div class="modal"><div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body">${body}</div><div class="modal-footer">${footer}</div></div>`;document.getElementById('app').appendChild(ov);}
function closeModal(){const o=document.getElementById('modal-ov');if(o)o.remove();}

load().then(()=>{setView('kanban',document.querySelectorAll('.nav-btn')[1]);});
</script>
</body>
</html>
