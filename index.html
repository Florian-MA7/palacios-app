
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);background:var(--color-background-tertiary)}

.app{display:flex;flex-direction:column;height:100vh;min-height:600px;background:var(--color-background-tertiary)}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:13px;font-weight:500;letter-spacing:.05em;color:var(--color-text-secondary)}
.logo span{color:var(--color-text-primary)}
.client-badge{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.topbar-right{display:flex;align-items:center;gap:8px}
.role-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);border:none}

.nav{display:flex;gap:2px;padding:8px 16px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.nav-btn{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:none;background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}

.content{flex:1;overflow-y:auto;padding:16px}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.add-btn{font-size:12px;padding:6px 14px;border-radius:var(--border-radius-md);border:none;background:var(--color-text-primary);color:var(--color-background-primary);cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500}

.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:start}
.col{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px;border:0.5px solid var(--color-border-tertiary)}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.col-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em}
.col-count{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-primary);border-radius:20px;padding:1px 7px;border:0.5px solid var(--color-border-tertiary)}

.card{background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);border-left:3px solid var(--card-accent);margin-bottom:8px;padding:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary);border-left-color:var(--card-accent)}
.card.urgent{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:6px}
.card-title{font-size:12px;font-weight:500;line-height:1.4;flex:1}
.card-nets{display:flex;gap:3px;flex-shrink:0}
.net-dot{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:500}
.net-li{background:var(--color-background-info);color:var(--color-text-info)}
.net-ig{background:#fce4ec;color:#c2185b}
.net-pi{background:#fce4ec;color:#ad1457}
.net-fb{background:#e3f2fd;color:#1565c0}
.net-reel{background:#f3e5f5;color:#6a1b9a}
.net-story{background:#fff3e0;color:#e65100}

.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-cat{font-size:10px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 6px;border-radius:3px}
.card-date{font-size:10px;color:var(--color-text-tertiary)}

.card-flag{display:flex;align-items:center;gap:4px;margin-top:6px;padding:4px 6px;border-radius:4px;background:var(--color-background-warning)}
.card-flag i{font-size:12px;color:var(--color-text-warning)}
.card-flag span{font-size:10px;color:var(--color-text-warning);line-height:1.3}

.card-visual{height:60px;border-radius:4px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:6px;font-size:10px;color:var(--color-text-tertiary);border:0.5px dashed var(--color-border-tertiary);overflow:hidden}
.card-visual img{width:100%;height:100%;object-fit:cover;border-radius:4px}

.s-draft{--card-accent:#888}
.s-tocomplete{--card-accent:#f59e0b}
.s-pending{--card-accent:#3b82f6}
.s-returned{--card-accent:#f97316}
.s-validated{--card-accent:#22c55e}
.s-published{--card-accent:#a855f7}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:10px;color:var(--color-text-secondary);margin-top:2px}

.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:4px;border-radius:4px}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-footer{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;justify-content:flex-end;gap:8px}

.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.field input,.field textarea,.field select{font-size:13px;font-family:var(--font-sans);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);padding:7px 10px;width:100%;resize:none}
.field textarea{min-height:80px}

.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.cb-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.cb-item input{width:14px;height:14px;cursor:pointer}

.flag-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--border-radius-md);background:var(--color-background-warning);border:0.5px solid var(--color-border-warning)}
.flag-row i{font-size:14px;color:var(--color-text-warning);flex-shrink:0;margin-top:1px}
.flag-row span{font-size:12px;color:var(--color-text-warning);line-height:1.4}

.btn-primary{font-size:13px;padding:7px 16px;border-radius:var(--border-radius-md);border:none;background:var(--color-text-primary);color:var(--color-background-primary);cursor:pointer;font-weight:500}
.btn-secondary{font-size:13px;padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}

.feed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.feed-cell{aspect-ratio:1;background:var(--color-background-secondary);border-radius:3px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.feed-cell img{width:100%;height:100%;object-fit:cover}
.feed-cell-empty{font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:8px}
.feed-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;padding:5px;opacity:0;transition:opacity .2s}
.feed-cell:hover .feed-overlay{opacity:1}
.feed-overlay-text{font-size:9px;color:#fff;line-height:1.3}
.feed-status-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:10px;color:var(--color-text-tertiary);padding:4px;font-weight:500}
.cal-day{background:var(--color-background-secondary);border-radius:4px;min-height:60px;padding:5px;border:0.5px solid var(--color-border-tertiary)}
.cal-day.today{border-color:var(--color-border-info)}
.cal-day-num{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px}
.cal-post{font-size:9px;padding:2px 4px;border-radius:2px;margin-bottom:2px;cursor:pointer;line-height:1.3;border-left:2px solid var(--post-accent)}
.cal-post.s-draft{--post-accent:#888;background:var(--color-background-secondary)}
.cal-post.s-tocomplete{--post-accent:#f59e0b;background:#fef3c7}
.cal-post.s-pending{--post-accent:#3b82f6;background:#dbeafe}
.cal-post.s-validated{--post-accent:#22c55e;background:#dcfce7}
.cal-post.s-published{--post-accent:#a855f7;background:#f3e8ff}

.empty-col{text-align:center;padding:16px 8px;font-size:11px;color:var(--color-text-tertiary)}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);padding:8px 16px;border-radius:var(--border-radius-md);font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.preview-tabs{display:flex;gap:6px;margin-bottom:10px}
.preview-tab{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.preview-tab.active{background:var(--color-background-secondary);color:var(--color-text-primary)}
.preview-box{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);padding:12px;font-size:12px;color:var(--color-text-primary);line-height:1.6;min-height:80px;white-space:pre-wrap}

.detail-header{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--card-accent)}
.detail-section{margin-bottom:12px}
.detail-label{font-size:11px;color:var(--color-text-secondary);font-weight:500;margin-bottom:4px}
.comment-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px;font-size:12px;line-height:1.5;color:var(--color-text-primary)}
.comment-meta{font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px}

.drive-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);cursor:pointer;font-size:12px}
.drive-item:hover{border-color:var(--color-border-secondary)}
.drive-item i{color:var(--color-text-secondary);font-size:14px}
</style>

<h2 class="sr-only">808 LAB — Gestionnaire de contenu social PALACIOS</h2>
<div class="app" id="app" style="position:relative">

<div class="topbar">
  <div class="topbar-left">
    <span class="logo"><span>808</span> LAB</span>
    <span class="client-badge"><i class="ti ti-building" aria-hidden="true"></i> PALACIOS</span>
  </div>
  <div class="topbar-right">
    <span class="role-pill" id="role-pill">Admin</span>
    <button class="btn-secondary" style="font-size:11px;padding:4px 10px" onclick="toggleRole()">Vue client</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <button class="nav-btn active" onclick="setView('kanban',this)"><i class="ti ti-layout-kanban" aria-hidden="true"></i> Kanban</button>
  <button class="nav-btn" onclick="setView('calendar',this)"><i class="ti ti-calendar" aria-hidden="true"></i> Planning</button>
  <button class="nav-btn" onclick="setView('feed',this)"><i class="ti ti-layout-grid" aria-hidden="true"></i> Feed</button>
  <button class="nav-btn" onclick="setView('library',this)"><i class="ti ti-photo-library" aria-hidden="true"></i> Bibliothèque</button>
</div>

<div class="content" id="main-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUS={
  draft:{label:'Brouillon',color:'#888',cls:'s-draft'},
  tocomplete:{label:'À compléter',color:'#f59e0b',cls:'s-tocomplete'},
  pending:{label:'En attente',color:'#3b82f6',cls:'s-pending'},
  returned:{label:'Retour client',color:'#f97316',cls:'s-returned'},
  validated:{label:'Validé',color:'#22c55e',cls:'s-validated'},
  published:{label:'Publié',color:'#a855f7',cls:'s-published'}
};
const FORMATS=['Post','Carrousel','Reel','Story','Épingle'];
const NETS=['LinkedIn','Instagram','Pinterest','Facebook'];
const CATS=['Réalisation','Zoom Équipe','Produit','Matériaux','Coulisses','Zoom Produit'];

let state={cards:[],view:'kanban',filterNet:'',filterCat:'',role:'admin',modal:null};

const defaultCards=[
  {id:'c1',title:'Création d\'un comptoir boulangerie en Krion blanc',cat:'Réalisation',nets:['Instagram','Pinterest'],format:'Post',status:'tocomplete',date:'2026-06-18',text:'Un comptoir pensé pour durer. Le Krion blanc, imperméable et sans joints, s\'impose naturellement dans les espaces alimentaires.',flags:['Nom exact du client / lieu ?','Matière Krion ou Corian ?','Photos HD disponibles ?'],comments:[{role:'client',text:'C\'est la boulangerie Maison Dupont à Toulouse. J\'envoie les photos cette semaine.',date:'14 juin'}],driveFolder:'Réalisations/Boulangerie_Dupont_2026'},
  {id:'c2',title:'Portrait : José Pereira, 22 ans en atelier',cat:'Zoom Équipe',nets:['LinkedIn','Instagram'],format:'Post',status:'pending',date:'2026-06-20',text:'22 ans à façonner du bois, de l\'acier, du Solid Surface. José, chef d\'atelier chez PALACIOS, nous raconte son métier.',flags:[],comments:[],driveFolder:''},
  {id:'c3',title:'Dekton : la matière qui résiste à tout',cat:'Matériaux',nets:['LinkedIn','Instagram','Pinterest'],format:'Carrousel',status:'draft',date:'2026-06-25',text:'',flags:[],comments:[],driveFolder:''},
  {id:'c4',title:'Réalisation : suite hôtelière Toulouse Centre',cat:'Réalisation',nets:['Instagram','Pinterest'],format:'Reel',status:'validated',date:'2026-06-27',text:'Une suite pensée dans ses moindres détails. Meuble TV, tête de lit intégrée, vasque sur-mesure — tout sort de nos ateliers.',flags:[],comments:[{role:'admin',text:'Vidéo disponible sur Drive, dossier Hôtel_Toulouse_2026',date:'13 juin'}],driveFolder:'Réalisations/Hotel_Toulouse_2026'},
  {id:'c5',title:'Coulisses : le travail de la sublimation',cat:'Coulisses',nets:['Instagram','Facebook'],format:'Story',status:'draft',date:'2026-07-02',text:'',flags:['Vidéo à tourner en atelier — prévoir 30 sec max'],comments:[],driveFolder:''},
  {id:'c6',title:'Zoom vasque : modèle double encastrée',cat:'Zoom Produit',nets:['Instagram','Pinterest'],format:'Post',status:'published',date:'2026-06-10',text:'La vasque double encastrée en Corian Sand. Zéro joint, entretien minimal, élégance maximale.',flags:[],comments:[],driveFolder:'Produits/Vasques'}
];

async function loadState(){
  try{
    const r=await window.storage.get('palacios_cards',true);
    if(r&&r.value){state.cards=JSON.parse(r.value)}
    else{state.cards=defaultCards;await saveCards()}
  }catch(e){state.cards=defaultCards}
}

async function saveCards(){
  try{await window.storage.set('palacios_cards',JSON.stringify(state.cards),true)}catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function toggleRole(){
  state.role=state.role==='admin'?'client':'admin';
  document.getElementById('role-pill').textContent=state.role==='admin'?'Admin':'Client';
  document.querySelector('[onclick*="toggleRole"]').textContent=state.role==='admin'?'Vue client':'Vue admin';
  render();
}

function setView(v,btn){
  state.view=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function netBadge(n){
  const cls={LinkedIn:'net-li',Instagram:'net-ig',Pinterest:'net-pi',Facebook:'net-fb',Reel:'net-reel',Story:'net-story'};
  return`<span class="net-dot ${cls[n]||'net-li'}">${n.slice(0,2)}</span>`;
}

function statusDot(s){
  return`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${STATUS[s]?.color||'#888'};margin-right:4px"></span>`;
}

function renderCard(c){
  const st=STATUS[c.status]||STATUS.draft;
  const urgent=(c.status==='tocomplete'||c.status==='pending');
  const flagHtml=c.flags&&c.flags.length?`<div class="card-flag"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span>${c.flags[0]}${c.flags.length>1?` +${c.flags.length-1}`:''}</span></div>`:'';
  const formatBadge=c.format&&(c.format==='Reel'||c.format==='Story')?`<span class="net-dot ${c.format==='Reel'?'net-reel':'net-story'}">${c.format}</span>`:'';
  return`<div class="card ${st.cls}${urgent?' urgent':''}" onclick="openCard('${c.id}')">
    <div class="card-top">
      <span class="card-title">${c.title}</span>
      <div class="card-nets">${(c.nets||[]).map(netBadge).join('')}${formatBadge}</div>
    </div>
    ${c.driveFolder?`<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:4px;display:flex;align-items:center;gap:3px"><i class="ti ti-brand-google-drive" aria-hidden="true"></i>${c.driveFolder}</div>`:''}
    ${flagHtml}
    <div class="card-meta">
      <span class="card-cat">${c.cat||''}</span>
      <span class="card-date">${c.date||''}</span>
    </div>
  </div>`;
}

function filteredCards(){
  return state.cards.filter(c=>{
    if(state.role==='client'&&(c.status==='draft'))return false;
    if(state.filterNet&&!(c.nets||[]).includes(state.filterNet))return false;
    if(state.filterCat&&c.cat!==state.filterCat)return false;
    return true;
  });
}

function renderKanban(){
  const cols=Object.entries(STATUS);
  const fc=filteredCards();
  const pending=fc.filter(c=>c.status==='tocomplete'||c.status==='pending').length;

  let html=`<div class="stats-bar">
    <div class="stat"><div class="stat-n">${state.cards.length}</div><div class="stat-l">Posts total</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--color-text-warning)">${state.cards.filter(c=>c.status==='tocomplete').length}</div><div class="stat-l">À compléter</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--color-text-info)">${state.cards.filter(c=>c.status==='pending').length}</div><div class="stat-l">En attente</div></div>
    <div class="stat"><div class="stat-n" style="color:#22c55e">${state.cards.filter(c=>c.status==='validated').length}</div><div class="stat-l">Validés</div></div>
  </div>`;

  html+=`<div class="toolbar">
    <div class="toolbar-left">
      <button class="filter-btn${!state.filterNet?' active':''}" onclick="setFilter('net','')">Tous réseaux</button>
      ${NETS.map(n=>`<button class="filter-btn${state.filterNet===n?' active':''}" onclick="setFilter('net','${n}')">${n}</button>`).join('')}
    </div>
    ${state.role==='admin'?`<button class="add-btn" onclick="openNewCard()"><i class="ti ti-plus" aria-hidden="true"></i> Nouveau post</button>`:''}
  </div>`;

  html+=`<div class="kanban">`;
  cols.forEach(([key,s])=>{
    if(state.role==='client'&&key==='draft')return;
    const cards=fc.filter(c=>c.status===key);
    html+=`<div class="col">
      <div class="col-header">
        <span class="col-title" style="color:${s.color}">${s.label}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      ${cards.length?cards.map(renderCard).join(''):`<div class="empty-col"><i class="ti ti-inbox" aria-hidden="true"></i><br>Vide</div>`}
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function renderFeed(){
  const igCards=filteredCards().filter(c=>(c.nets||[]).includes('Instagram')&&c.status!=='draft');
  const piCards=filteredCards().filter(c=>(c.nets||[]).includes('Pinterest')&&c.status!=='draft');

  let html=`<div class="toolbar">
    <div class="toolbar-left">
      <button class="filter-btn active" style="pointer-events:none">Feed visuel</button>
    </div>
  </div>`;

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;

  html+=`<div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <span style="font-size:12px;font-weight:500">Instagram</span>
      <span style="font-size:10px;color:var(--color-text-tertiary)">${igCards.length} posts</span>
    </div>
    <div class="feed-grid">
    ${igCards.slice(0,9).map(c=>`
      <div class="feed-cell" onclick="openCard('${c.id}')">
        <div class="feed-cell-empty"><i class="ti ti-photo" aria-hidden="true"></i><br>${c.format||'Post'}</div>
        <div class="feed-overlay"><span class="feed-overlay-text">${c.title}</span></div>
        <div class="feed-status-dot" style="background:${STATUS[c.status]?.color||'#888'}"></div>
      </div>
    `).join('')}
    ${Array(Math.max(0,9-igCards.slice(0,9).length)).fill('<div class="feed-cell"><div class="feed-cell-empty"><i class="ti ti-plus" aria-hidden="true"></i></div></div>').join('')}
    </div>
  </div>`;

  html+=`<div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <span style="font-size:12px;font-weight:500">Pinterest</span>
      <span style="font-size:10px;color:var(--color-text-tertiary)">${piCards.length} épingles</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
    ${piCards.slice(0,6).map((c,i)=>`
      <div class="feed-cell" style="aspect-ratio:${i%3===0?'2/3':'1/1'}" onclick="openCard('${c.id}')">
        <div class="feed-cell-empty"><i class="ti ti-pin" aria-hidden="true"></i><br>${c.title.slice(0,20)}...</div>
        <div class="feed-overlay"><span class="feed-overlay-text">${c.title}</span></div>
        <div class="feed-status-dot" style="background:${STATUS[c.status]?.color||'#888'}"></div>
      </div>
    `).join('')}
    </div>
  </div>`;

  html+=`</div>`;
  return html;
}

function renderCalendar(){
  const days=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const fc=filteredCards();
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const totalCells=Math.ceil((startDow+lastDay.getDate())/7)*7;

  let html=`<div class="toolbar">
    <div class="toolbar-left">
      <span style="font-size:13px;font-weight:500">${firstDay.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</span>
    </div>
    ${state.role==='admin'?`<button class="add-btn" onclick="openNewCard()"><i class="ti ti-plus" aria-hidden="true"></i> Nouveau post</button>`:''}
  </div>
  <div class="calendar-grid">
    ${days.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}`;

  for(let i=0;i<totalCells;i++){
    const dayNum=i-startDow+1;
    const isValid=dayNum>=1&&dayNum<=lastDay.getDate();
    const dateStr=isValid?`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`:'';
    const isToday=dateStr===new Date().toISOString().split('T')[0];
    const daycards=isValid?fc.filter(c=>c.date===dateStr):[];
    html+=`<div class="cal-day${isToday?' today':''}" style="${!isValid?'opacity:.3':''}">
      <div class="cal-day-num">${isValid?dayNum:''}</div>
      ${daycards.map(c=>`<div class="cal-post ${STATUS[c.status]?.cls||'s-draft'}" onclick="openCard('${c.id}')" title="${c.title}">${c.title.slice(0,18)}${c.title.length>18?'…':''}</div>`).join('')}
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function renderLibrary(){
  const evergreen=state.cards.filter(c=>c.status==='published');
  let html=`<div class="toolbar">
    <div class="toolbar-left"><span style="font-size:13px;font-weight:500">Contenu publié & réutilisable</span></div>
  </div>`;
  if(!evergreen.length){html+=`<div style="text-align:center;padding:40px;color:var(--color-text-tertiary)"><i class="ti ti-archive" style="font-size:32px" aria-hidden="true"></i><br><br>Aucun post publié pour l'instant.</div>`;return html;}
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">`;
  evergreen.forEach(c=>{
    html+=`<div class="card s-published" style="cursor:pointer" onclick="openCard('${c.id}')">
      <div class="card-top"><span class="card-title">${c.title}</span><div class="card-nets">${(c.nets||[]).map(netBadge).join('')}</div></div>
      <div class="card-meta"><span class="card-cat">${c.cat}</span><span class="card-date">${c.date}</span></div>
      <div style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary);display:flex;gap:6px">
        <button style="font-size:10px;padding:2px 8px;border-radius:3px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary)" onclick="event.stopPropagation();dupCard('${c.id}')"><i class="ti ti-copy" aria-hidden="true"></i> Réutiliser</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function setFilter(type,val){
  if(type==='net')state.filterNet=val;
  if(type==='cat')state.filterCat=val;
  render();
}

function render(){
  const el=document.getElementById('main-content');
  if(state.view==='kanban')el.innerHTML=renderKanban();
  else if(state.view==='feed')el.innerHTML=renderFeed();
  else if(state.view==='calendar')el.innerHTML=renderCalendar();
  else if(state.view==='library')el.innerHTML=renderLibrary();
}

function openNewCard(){
  state.modal={type:'new',card:{id:'c'+Date.now(),title:'',cat:CATS[0],nets:[],format:'Post',status:'draft',date:'',text:'',flags:[],comments:[],driveFolder:''}};
  renderModal();
}

function openCard(id){
  const card=state.cards.find(c=>c.id===id);
  if(!card)return;
  state.modal={type:'detail',card:{...card},activePreview:'LinkedIn'};
  renderModal();
}

function dupCard(id){
  const card=state.cards.find(c=>c.id===id);
  if(!card)return;
  const nc={...JSON.parse(JSON.stringify(card)),id:'c'+Date.now(),status:'draft',date:'',comments:[]};
  nc.title='[Copie] '+nc.title;
  state.cards.push(nc);
  saveCards();
  render();
  showToast('Post dupliqué en brouillon');
}

function renderModal(){
  const existing=document.getElementById('modal-overlay');
  if(existing)existing.remove();
  if(!state.modal)return;

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeModal()};

  const m=state.modal;
  const c=m.card;
  const isNew=m.type==='new';
  const isClient=state.role==='client';
  const st=STATUS[c.status]||STATUS.draft;

  let body='';

  if(isNew||(!isClient&&m.type==='detail')){
    body=`
    <div class="field"><label>Titre</label><input id="f-title" value="${c.title||''}" placeholder="Titre du post..."></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Catégorie</label><select id="f-cat">${CATS.map(v=>`<option${c.cat===v?' selected':''}>${v}</option>`).join('')}</select></div>
      <div class="field"><label>Format</label><select id="f-format">${FORMATS.map(v=>`<option${c.format===v?' selected':''}>${v}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Réseaux</label><div class="checkbox-group">${NETS.map(n=>`<label class="cb-item"><input type="checkbox" value="${n}"${(c.nets||[]).includes(n)?' checked':''}> ${n}</label>`).join('')}</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Date prévue</label><input id="f-date" type="date" value="${c.date||''}"></div>
      <div class="field"><label>Statut</label><select id="f-status">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}"${c.status===k?' selected':''}>${v.label}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Texte du post</label><textarea id="f-text" placeholder="Rédigez le texte ici...">${c.text||''}</textarea></div>
    <div class="field"><label>Dossier Drive</label><input id="f-drive" value="${c.driveFolder||''}" placeholder="ex: Réalisations/Projet_XYZ"></div>
    <div class="field"><label>Infos manquantes (visible client)</label><textarea id="f-flags" placeholder="Une info par ligne..." style="min-height:60px">${(c.flags||[]).join('\n')}</textarea></div>
    `;
  } else {
    const previewText={
      LinkedIn:`${c.text||'[Texte à rédiger]'}\n\n#Palacios #AménagementIntérieur #SolidSurface`,
      Instagram:`${c.text||'[Texte à rédiger]'}\n\n📍 Toulouse\n#palacios #surmesure #mobilier`,
      Pinterest:`${c.title||''}\n\n${c.text||'[Description]'}`
    };
    const activeNet=m.activePreview||'LinkedIn';

    body=`
    <div class="detail-header ${st.cls}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        ${statusDot(c.status)}<span style="font-size:11px;font-weight:500;color:${st.color}">${st.label}</span>
        <span style="font-size:11px;color:var(--color-text-tertiary);margin-left:4px">${c.format||'Post'}</span>
      </div>
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">${c.title}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${(c.nets||[]).map(netBadge).join('')}</div>
    </div>
    ${c.flags&&c.flags.length&&!isClient?`<div class="flag-row"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span>${c.flags.join(' • ')}</span></div>`:''}
    ${c.flags&&c.flags.length?`<div class="detail-section"><div class="detail-label">Infos à compléter</div>
      ${c.flags.map((f,i)=>`<div class="flag-row" style="margin-bottom:4px"><i class="ti ti-circle-dotted" aria-hidden="true"></i><span>${f}</span></div>`).join('')}
      ${isClient?`<div class="field" style="margin-top:8px"><textarea id="f-clientanswer" placeholder="Votre réponse ici..." style="min-height:60px"></textarea></div>`:''}
    </div>`:''}
    <div class="detail-section">
      <div class="detail-label">Aperçu par réseau</div>
      <div class="preview-tabs">
        ${['LinkedIn','Instagram','Pinterest'].map(n=>`<button class="preview-tab${activeNet===n?' active':''}" onclick="setPreviewNet('${c.id}','${n}')">${n}</button>`).join('')}
      </div>
      <div class="preview-box">${previewText[activeNet]||c.text||''}</div>
    </div>
    ${c.driveFolder?`<div class="detail-section"><div class="detail-label">Dossier Drive</div><div class="drive-item"><i class="ti ti-brand-google-drive" aria-hidden="true"></i>${c.driveFolder}</div></div>`:''}
    ${c.comments&&c.comments.length?`<div class="detail-section"><div class="detail-label">Commentaires</div>${c.comments.map(cm=>`<div class="comment-box" style="margin-bottom:6px"><div class="comment-meta">${cm.role==='client'?'Client':'Admin'} · ${cm.date}</div>${cm.text}</div>`).join('')}</div>`:''}
    <div class="field"><textarea id="f-comment" placeholder="Ajouter un commentaire..." style="min-height:50px"></textarea></div>
    `;
  }

  const footer=isNew?`
    <button class="btn-secondary" onclick="closeModal()">Annuler</button>
    <button class="btn-primary" onclick="saveNewCard()">Créer le post</button>
  `:isClient?`
    <button class="btn-secondary" onclick="closeModal()">Fermer</button>
    ${c.flags&&c.flags.length?`<button class="btn-primary" onclick="submitClientAnswer('${c.id}')">Envoyer ma réponse</button>`:''}
    ${c.status==='pending'?`<button class="btn-primary" style="background:#22c55e" onclick="validateCard('${c.id}')"><i class="ti ti-check" aria-hidden="true"></i> Valider ce post</button>`:''}
  `:`
    <button class="btn-secondary" onclick="closeModal()">Fermer</button>
    <button class="btn-secondary" onclick="addComment('${c.id}')">Commenter</button>
    <button class="btn-primary" onclick="saveEditCard('${c.id}')">Enregistrer</button>
  `;

  overlay.innerHTML=`<div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span class="modal-title">${isNew?'Nouveau post':c.title}</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Fermer"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-footer">${footer}</div>
  </div>`;

  document.getElementById('app').appendChild(overlay);
}

function setPreviewNet(id,net){
  if(state.modal){state.modal.activePreview=net;renderModal()}
}

function closeModal(){
  const o=document.getElementById('modal-overlay');
  if(o)o.remove();
  state.modal=null;
}

function saveNewCard(){
  const c=state.modal.card;
  c.title=document.getElementById('f-title').value.trim();
  c.cat=document.getElementById('f-cat').value;
  c.format=document.getElementById('f-format').value;
  c.date=document.getElementById('f-date').value;
  c.status=document.getElementById('f-status').value;
  c.text=document.getElementById('f-text').value;
  c.driveFolder=document.getElementById('f-drive').value;
  c.flags=document.getElementById('f-flags').value.split('\n').filter(f=>f.trim());
  c.nets=[...document.querySelectorAll('#modal-overlay input[type=checkbox]:checked')].map(i=>i.value);
  if(!c.title){showToast('Titre requis');return}
  state.cards.push(c);
  saveCards();
  closeModal();
  render();
  showToast('Post créé');
}

function saveEditCard(id){
  const idx=state.cards.findIndex(c=>c.id===id);
  if(idx<0)return;
  const comment=document.getElementById('f-comment')?.value?.trim();
  if(comment){
    state.cards[idx].comments=state.cards[idx].comments||[];
    state.cards[idx].comments.push({role:'admin',text:comment,date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});
  }
  saveCards();
  closeModal();
  render();
  showToast('Enregistré');
}

function validateCard(id){
  const idx=state.cards.findIndex(c=>c.id===id);
  if(idx<0)return;
  state.cards[idx].status='validated';
  state.cards[idx].comments=state.cards[idx].comments||[];
  state.cards[idx].comments.push({role:'client',text:'✓ Post validé.',date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});
  saveCards();
  closeModal();
  render();
  showToast('Post validé !');
}

function submitClientAnswer(id){
  const idx=state.cards.findIndex(c=>c.id===id);
  if(idx<0)return;
  const ans=document.getElementById('f-clientanswer')?.value?.trim();
  if(!ans){showToast('Réponse vide');return}
  state.cards[idx].comments=state.cards[idx].comments||[];
  state.cards[idx].comments.push({role:'client',text:ans,date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});
  state.cards[idx].status='returned';
  saveCards();
  closeModal();
  render();
  showToast('Réponse envoyée');
}

function addComment(id){
  const idx=state.cards.findIndex(c=>c.id===id);
  if(idx<0)return;
  const comment=document.getElementById('f-comment')?.value?.trim();
  if(!comment){showToast('Commentaire vide');return}
  state.cards[idx].comments=state.cards[idx].comments||[];
  state.cards[idx].comments.push({role:'admin',text:comment,date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});
  saveCards();
  closeModal();
  render();
  showToast('Commentaire ajouté');
}

loadState().then(()=>render());
</script>
